<div class="container" style="padding-top: 2rem; max-width: 640px;">
  <div class="card card-pad">
    <h2>Modificar datos personales</h2>
    <p class="help">Podés actualizar tu nombre, apellido y teléfono.</p>

    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <div class="label">Nombre</div>
        <input
          class="control"
          formControlName="nombre"
          [attr.aria-invalid]="form.controls.nombre.touched && form.controls.nombre.invalid ? 'true' : 'false'"
        />
        <div class="error-text" *ngIf="form.controls.nombre.touched && form.controls.nombre.hasError('required')">
          El nombre es obligatorio.
        </div>
      </div>

      <div class="field">
        <div class="label">Apellido</div>
        <input
          class="control"
          formControlName="apellido"
          [attr.aria-invalid]="form.controls.apellido.touched && form.controls.apellido.invalid ? 'true' : 'false'"
        />
        <div class="error-text" *ngIf="form.controls.apellido.touched && form.controls.apellido.hasError('required')">
          El apellido es obligatorio.
        </div>
      </div>

      <div class="field">
        <div class="label">Teléfono</div>
        <input
          class="control"
          formControlName="telefono"
          inputmode="tel"
        />
      </div>

      <div class="error-text" *ngIf="submitError">{{ submitError }}</div>
      <div class="help" *ngIf="successMessage" style="font-weight: 900; color: var(--brand-blue);">
        {{ successMessage }}
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting || form.invalid">
          {{ isSubmitting ? 'Guardando…' : 'Guardar cambios' }}
        </button>
        <a class="help" routerLink="/mi-informacion">Volver a mi información</a>
      </div>
    </form>
  </div>
</div>

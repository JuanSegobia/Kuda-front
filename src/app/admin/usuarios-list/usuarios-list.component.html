<section class="card usuarios-section">
  <div class="card-head">
    <h3>Usuarios</h3>
    <button (click)="limpiarFiltros()">Refrescar</button>
  </div>

  <!-- Filtros -->
  <form class="usuarios-filtros form" [formGroup]="filtros">
    <div class="filtros-row">
      <div class="field">
        <div class="label">Buscar</div>
        <input
          class="control"
          type="search"
          formControlName="q"
          placeholder="Nombre, apellido, DNI o email"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <div class="label">Estado</div>
        <select class="control" formControlName="estado">
          <option value="">Todos</option>
          <option value="ACTIVO">Activo</option>
          <option value="INACTIVO">Inactivo</option>
        </select>
      </div>

      <div class="field">
        <div class="label">Rol</div>
        <select class="control" formControlName="rol">
          <option value="">Todos</option>
          <option value="ADMIN">Admin</option>
          <option value="RECEPCIONISTA">Recepcionista</option>
          <option value="CLIENTE">Cliente</option>
        </select>
      </div>

      <div class="field" *ngIf="hayFiltrosAplicados()">
        <div class="label">&nbsp;</div>
        <button type="button" class="control btn-limpiar" (click)="limpiarFiltros()">
          Limpiar filtros
        </button>
      </div>
    </div>
  </form>

  <!-- Estados -->
  <p class="muted" *ngIf="isLoading">Cargando…</p>
  <p class="error" *ngIf="!isLoading && errorMsg">{{ errorMsg }}</p>
  <p class="muted" *ngIf="!isLoading && !errorMsg && usuarios.length === 0">
    No se encontraron usuarios{{ hayFiltrosAplicados() ? ' con los filtros aplicados' : '' }}.
  </p>

  <!-- Tabla -->
  <div class="table" *ngIf="!isLoading && !errorMsg && usuarios.length > 0">
    <div class="row head">
      <div>Nombre</div>
      <div>Email</div>
      <div>DNI</div>
      <div>Rol</div>
      <div>Estado</div>
      <div></div>
    </div>
    <div class="row" *ngFor="let u of usuarios">
      <div>{{ u.nombre }} {{ u.apellido }}</div>
      <div>{{ u.email }}</div>
      <div>{{ u.dni }}</div>
      <div>{{ rolLabel(u) }}</div>
      <div>
        <span class="badge" [class.badge-inactivo]="!u.activo">{{ estadoLabel(u) }}</span>
      </div>
      <div class="right">
        <a class="btn-tabla" [routerLink]="['/admin/usuarios', u.email, 'editar']">Editar</a>
      </div>
    </div>
  </div>
</section>

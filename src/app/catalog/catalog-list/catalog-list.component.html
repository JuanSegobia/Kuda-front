<main class="catalog-main-content">
  <div class="catalog-head">
    <h1>Actividades y gestión</h1>
    <p class="catalog-subtitle">
      Accedé a planes y pagos desde una UI optimizada para móvil.
    </p>
  </div>

  <section class="table-block">
    <h2>Planes Disponibles</h2>
    <table class="socios-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Duración (días)</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let plan of planes">
          <td>{{ plan.nombre }}</td>
          <td>${{ plan.precio }}</td>
          <td>{{ plan.duracion_dias }}</td>
          <td>
            <button class="btn btn-primary" type="button" (click)="pagarPlan(plan)">
              Pagar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <p class="form-error" *ngIf="pagoError">{{ pagoError }}</p>
  </section>
</main>

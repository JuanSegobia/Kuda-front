<div class="container" style="padding-top: 1.25rem;">
  <div class="card card-pad">
    <h2>Nueva contraseña</h2>
    <p class="help">Ingresá tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <div class="label">Nueva contraseña</div>
        <input
          class="control"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid ? 'true' : 'false'"
        />
        <div class="error-text" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">
          La contraseña es obligatoria.
        </div>
        <div class="error-text" *ngIf="form.controls.password.touched && form.controls.password.hasError('minlength')">
          Debe tener al menos 8 caracteres.
        </div>
      </div>

      <div class="field">
        <div class="label">Confirmar contraseña</div>
        <input
          class="control"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          [attr.aria-invalid]="(form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) || (form.touched && form.hasError('passwordsMismatch')) ? 'true' : 'false'"
        />
        <div class="error-text" *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')">
          Confirmá tu contraseña.
        </div>
        <div class="error-text" *ngIf="form.touched && form.hasError('passwordsMismatch')">
          Las contraseñas no coinciden.
        </div>
      </div>

      <div class="error-text" *ngIf="submitError">{{ submitError }}</div>
      <div class="help" *ngIf="successMessage" style="font-weight: 900; color: var(--brand-blue);">
        {{ successMessage }}
        <a routerLink="/login">Ir al inicio de sesión</a>
      </div>

      <div class="form-actions" *ngIf="!successMessage">
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting || form.invalid">
          {{ isSubmitting ? 'Guardando…' : 'Guardar nueva contraseña' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div class="container" style="padding-top: 1.25rem;">
  <div class="card card-pad">
    <h2>Recuperar contraseña</h2>
    <p class="help">Ingresá tu email y te enviaremos un enlace para restablecer tu contraseña. El enlace expira en 48 horas.</p>

    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <div class="label">Email</div>
        <input
          class="control"
          type="email"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
          [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid ? 'true' : 'false'"
        />
        <div class="error-text" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">
          El email es obligatorio.
        </div>
        <div class="error-text" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">
          Ingresá un email válido.
        </div>
      </div>

      <div class="error-text" *ngIf="submitError">{{ submitError }}</div>
      <div class="help" *ngIf="successMessage" style="font-weight: 900; color: var(--brand-blue);">
        {{ successMessage }}
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting || form.invalid">
          {{ isSubmitting ? 'Enviando…' : 'Recuperar contraseña' }}
        </button>
        <a class="help" routerLink="/login">Volver al inicio de sesión</a>
      </div>
    </form>
  </div>
</div>
